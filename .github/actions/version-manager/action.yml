name: 'Version Manager'
description: 'Manages version numbering for releases'

inputs:
  version-type:
    description: 'Type of version (minor or major)'
    required: true
    default: 'minor'

outputs:
  version:
    description: 'Generated version number'
    value: ${{ steps.version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Set minor version
      if: inputs.version-type == 'minor'
      id: version
      shell: bash
      run: |
        # Get the latest minor version from existing releases
        LATEST_MINOR=$(gh release list --limit 1000 | grep "v0\." | head -1 | awk '{print $1}' | sed 's/v//')
        
        if [ -z "$LATEST_MINOR" ]; then
          # No existing minor versions, start with v0.0.1
          NEW_VERSION="0.0.1"
        else
          # Extract patch number and increment
          PATCH=$(echo $LATEST_MINOR | awk -F'.' '{print $3}')
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="0.0.$NEW_PATCH"
        fi
        
        echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Generated minor version: v$NEW_VERSION"

    - name: Set major version
      if: inputs.version-type == 'major'
      id: version
      shell: bash
      run: |
        # Get the latest major version from existing releases
        LATEST_MAJOR=$(gh release list --limit 1000 | grep "v[1-9]" | head -1 | awk '{print $1}' | sed 's/v//')
        
        if [ -z "$LATEST_MAJOR" ]; then
          # No existing major versions, start with v1.0.0
          NEW_VERSION="1.0.0"
        else
          # Extract major number and increment
          MAJOR=$(echo $LATEST_MAJOR | awk -F'.' '{print $1}')
          NEW_MAJOR=$((MAJOR + 1))
          NEW_VERSION="$NEW_MAJOR.0.0"
        fi
        
        echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Generated major version: v$NEW_VERSION" 