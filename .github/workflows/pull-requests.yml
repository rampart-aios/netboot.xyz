name: pull-requests

on:
  pull_request:
    branches:
      - local_dev
      - development

jobs:
  test-pr:
    name: Ansible Syntax Check and Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13' # renovate: datasource=github-tags depName=python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip  
        pip install ansible==10.2.0 # renovate: datasource=pypi
        pip install ansible-lint==24.7.0 # renovate: datasource=pypi

    - name: Syntax Check
      run: |
        ansible-playbook site.yml --syntax-check

    - name: Ansible lint
      run: |
        ansible-lint -v roles/netbootxyz/tasks

  build-pr:
    name: Build EFI for Pull Request
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Get commit hash
      id: commit_hash
      uses: ./.github/actions/get-commit-hash

    - name: Build EFI bootloader
      uses: ./.github/actions/build-efi
      with:
        version: ${{ steps.commit_hash.outputs.short_hash }}
        verify-content: 'true'
