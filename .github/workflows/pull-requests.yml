name: pull-requests

on:
  pull_request:
    branches:
      - local_dev
      - local_main

jobs:
  test:
    name: Test Pull Request
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13' # renovate: datasource=github-tags depName=python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip  
        pip install ansible==10.2.0 # renovate: datasource=pypi
        pip install ansible-lint==24.7.0 # renovate: datasource=pypi

    - name: Syntax Check
      run: |
        ansible-playbook site.yml --syntax-check

    - name: Ansible lint
      run: |
        ansible-lint -v roles/netbootxyz/tasks

  build:
    name: Build EFI Bootloader
    runs-on: ubuntu-latest
    concurrency:
      group: build-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build EFI
      run: |
        echo "Building EFI"
        NEW_NAME=$(./script/build_release | grep "NEW_NAME=" | cut -d'=' -f2)
        echo "NEW_NAME=$NEW_NAME" >> $GITHUB_ENV

    - name: Upload EFI
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.NEW_NAME }}
        path: buildout/ipxe/*.efi
        retention-days: 90
