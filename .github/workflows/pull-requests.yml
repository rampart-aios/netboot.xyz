name: pull-requests

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

env:
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  DOCKER_PLATFORM: 'linux/amd64'
  ARTIFACT_RETENTION_DAYS: 90
  COMMIT_HASH: ${{ github.sha }}

jobs:
  test-pr:
    name: Test Pull Request
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13' # renovate: datasource=github-tags depName=python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip  
        pip install ansible==10.2.0 # renovate: datasource=pypi
        pip install ansible-lint==24.7.0 # renovate: datasource=pypi

    - name: Syntax Check
      run: |
        ansible-playbook site.yml --syntax-check

    - name: Ansible lint
      run: |
        ansible-lint -v roles/netbootxyz/tasks

  build-pr:
    name: Build EFI Bootloader
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build EFI bootloader
        env:
          EFI_FILENAME_PREFIX: ${{ env.EFI_FILENAME_PREFIX }}
          DOCKER_PLATFORM: ${{ env.DOCKER_PLATFORM }}
          COMMIT_HASH: ${{ env.COMMIT_HASH }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: ./script/build_efi.sh

      - name: Upload EFI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EFI_FILENAME_PREFIX }}-${{ github.head_ref }}-$(echo ${{ env.COMMIT_HASH }} | cut -c1-7).efi
          path: buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-$(echo ${{ github.head_ref }} | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/\/-/-/g')-$(echo ${{ env.COMMIT_HASH }} | cut -c1-7).efi
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}