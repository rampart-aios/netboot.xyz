name: test-and-build

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

env:
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  ARTIFACT_RETENTION_DAYS: 90

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13' # renovate: datasource=github-tags depName=python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip  
        pip install ansible==10.2.0 # renovate: datasource=pypi
        pip install ansible-lint==24.7.0 # renovate: datasource=pypi

    - name: Syntax Check
      run: |
        ansible-playbook site.yml --syntax-check

    - name: Ansible lint
      run: |
        ansible-lint -v roles/netbootxyz/tasks

  build-pr:
    name: Build EFI Bootloader
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Run PR workflow
      id: pr_workflow
      run: |
        source ./script/workflow.sh
        output=$(run_pr_workflow)
        echo "$output"
        echo "version=$(echo "$output" | grep "version=" | tail -1 | cut -d'=' -f2)" >> $GITHUB_OUTPUT
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
        name: netboot.xyz-rampart-aios-${{ steps.pr_workflow.outputs.version }}.efi
        path: buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.pr_workflow.outputs.version }}.efi 