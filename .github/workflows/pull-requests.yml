name: pull-requests

on:
  pull_request:
    branches:
      - local_dev
      - local_main
  workflow_dispatch:
    inputs:
      mirror:
        description: "Ubuntu mirror base URL"
        required: false
        default: "https://releases.ubuntu.com"
      mirror_netbootxyz:
        description: "netboot.xyz ubuntu-squash releases base URL"
        required: false
        default: "https://github.com/netbootxyz/ubuntu-squash/releases/download"
      base_dir:
        description: "Ubuntu base directory"
        required: false
        default: "ubuntu"
      codename:
        description: "Ubuntu codename"
        required: false
        default: "noble"
      version:
        description: "Ubuntu version"
        required: false
        default: "24.04.3"
      netbootxyz_release:
        description: "netboot.xyz ubuntu-squash release tag"
        required: false
        default: "dac09526"
      os_arch:
        description: "Target architecture"
        required: false
        default: "amd64"
      department:
        description: "Target department"
        required: false
        default: "ciai-ws"
      machine:
        description: "Target machine identifier"
        required: false
        default: "ciai-cpu-w05587"

env:
  MIRROR: ${{ github.event.inputs.mirror || 'https://releases.ubuntu.com' }}
  MIRROR_NETBOOTXYZ: ${{ github.event.inputs.mirror_netbootxyz || 'https://github.com/netbootxyz/ubuntu-squash/releases/download' }}
  BASE_DIR: ${{ github.event.inputs.base_dir || 'ubuntu' }}
  CODENAME: ${{ github.event.inputs.codename || 'noble' }}
  VERSION: ${{ github.event.inputs.version || '24.04.3' }}
  NETBOOTXYZ_RELEASE: ${{ github.event.inputs.netbootxyz_release || 'dac09526' }}
  OS_ARCH: ${{ github.event.inputs.os_arch || 'amd64' }}
  DEPARTMENT: ${{ github.event.inputs.department || 'ciai-ws' }}
  MACHINE: ${{ github.event.inputs.machine || 'ciai-cpu-w05587' }}

jobs:
  test:
    name: Test Pull Request
    runs-on: ubuntu-latest
    concurrency:
      group: pr-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4

    - name: Show configuration inputs
      run: |
        echo "MIRROR=${MIRROR}"
        echo "MIRROR_NETBOOTXYZ=${MIRROR_NETBOOTXYZ}"
        echo "BASE_DIR=${BASE_DIR}"
        echo "CODENAME=${CODENAME}"
        echo "VERSION=${VERSION}"
        echo "NETBOOTXYZ_RELEASE=${NETBOOTXYZ_RELEASE}"
        echo "OS_ARCH=${OS_ARCH}"
        echo "DEPARTMENT=${DEPARTMENT}"
        echo "MACHINE=${MACHINE}"

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13' # renovate: datasource=github-tags depName=python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip  
        pip install ansible==10.2.0 # renovate: datasource=pypi
        pip install ansible-lint==24.7.0 # renovate: datasource=pypi

    - name: Syntax Check
      run: |
        ansible-playbook site.yml --syntax-check
    
    # TODO: Uncomment this after we fix the AnsibleCollectionFinder issue
    # - name: Ansible lint
    #   run: |
    #     ansible-lint -v roles/netbootxyz/tasks

  build:
    name: Build EFI Bootloader
    runs-on: ubuntu-latest
    concurrency:
      group: build-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4

    - name: Show configuration inputs
      run: |
        echo "MIRROR=${MIRROR}"
        echo "MIRROR_NETBOOTXYZ=${MIRROR_NETBOOTXYZ}"
        echo "BASE_DIR=${BASE_DIR}"
        echo "CODENAME=${CODENAME}"
        echo "VERSION=${VERSION}"
        echo "NETBOOTXYZ_RELEASE=${NETBOOTXYZ_RELEASE}"
        echo "OS_ARCH=${OS_ARCH}"
        echo "DEPARTMENT=${DEPARTMENT}"
        echo "MACHINE=${MACHINE}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build EFI
      run: |
        echo "Building EFI"
        NEW_NAME=$(./script/build_release | grep "NEW_NAME=" | cut -d'=' -f2)
        echo "NEW_NAME=$NEW_NAME" >> $GITHUB_ENV

    - name: Upload EFI
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.NEW_NAME }}
        path: buildout/ipxe/${{ env.NEW_NAME }}
        retention-days: 90
