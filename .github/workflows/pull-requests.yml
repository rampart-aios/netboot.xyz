name: pull-requests

on:
  pull_request:
    branches:
      - local_dev
      - development

jobs:
  test-pr:
    name: Ansible Syntax Check and Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13' # renovate: datasource=github-tags depName=python

    - name: Test Ansible
      run: source ./script/workflow.sh && test_ansible

  build-pr:
    name: Build EFI for Pull Request
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run PR workflow
      id: pr_workflow
      run: source ./script/workflow.sh && run_pr_workflow

    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        retention-days: 90
        name: netboot.xyz-rampart-aios-${{ steps.pr_workflow.outputs.version }}.efi
        path: buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.pr_workflow.outputs.version }}.efi