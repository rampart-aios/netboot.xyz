name: test-and-build

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

env:
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  ARTIFACT_RETENTION_DAYS: 90
  DOCKER_IMAGE: "localbuild"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13' # renovate: datasource=github-tags depName=python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip  
        pip install ansible==10.2.0 # renovate: datasource=pypi
        pip install ansible-lint==24.7.0 # renovate: datasource=pypi

    - name: Syntax Check
      run: |
        ansible-playbook site.yml --syntax-check

    - name: Ansible lint
      run: |
        ansible-lint -v roles/netbootxyz/tasks

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Get commit hash
      id: get_commit
      run: |
        commit_hash=$(git rev-parse --short HEAD)
        echo "commit_hash=$commit_hash" >> $GITHUB_OUTPUT
        echo "Building for commit: $commit_hash"
    
    - name: Build EFI Bootloader
      id: build
      run: |
        echo "Building EFI bootloader for commit: ${{ steps.get_commit.outputs.commit_hash }}"
        
        # Build EFI bootloader
        docker build -t ${{ env.DOCKER_IMAGE }} -f Dockerfile .
        docker run --rm -i -v $(pwd):/buildout ${{ env.DOCKER_IMAGE }}
        
        # Verify EFI content
        echo "Verifying EFI content..."
        ls -la buildout/ipxe/netboot.xyz.efi
        
        # Rename EFI file
        cp buildout/ipxe/netboot.xyz.efi buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-${{ steps.get_commit.outputs.commit_hash }}.efi
        echo "Renamed to ${{ env.EFI_FILENAME_PREFIX }}-${{ steps.get_commit.outputs.commit_hash }}.efi"
        
        echo "version=${{ steps.get_commit.outputs.commit_hash }}" >> $GITHUB_OUTPUT
    
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
        name: ${{ env.EFI_FILENAME_PREFIX }}-${{ steps.build.outputs.version }}.efi
        path: buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-${{ steps.build.outputs.version }}.efi 