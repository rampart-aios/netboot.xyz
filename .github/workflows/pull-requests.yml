name: pull-requests

on:
  pull_request:
    branches:
      - local_dev
      - local_main

jobs:
  test:
    name: Test Pull Request
    runs-on: ubuntu:24.04
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Debug Environment
      run: |
        echo "=== Environment Debug Info ==="
        echo "Python version: $(python --version)"
        echo "Python location: $(which python)"
        echo "Pip version: $(pip --version)"
        echo "GitHub context:"
        echo "  GITHUB_REF_NAME: ${{ github.ref_name }}"
        echo "  GITHUB_HEAD_REF: ${{ github.head_ref }}"
        echo "  GITHUB_EVENT_NAME: ${{ github.event_name }}"
        echo "  GITHUB_SHA: ${{ github.sha }}"
        echo "================================"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip  
        pip install ansible==10.3.0
        pip install ansible-lint==25.0.0

    - name: Syntax Check
      run: |
        ansible-playbook site.yml --syntax-check

    - name: Ansible lint
      run: |
        echo "=== Ansible Lint Debug ==="
        echo "Current directory: $(pwd)"
        echo "Ansible version: $(ansible --version)"
        echo "Ansible-lint version: $(ansible-lint --version)"
        echo "Checking if roles/netbootxyz/tasks exists:"
        ls -la roles/netbootxyz/tasks/ || echo "Directory not found"
        echo "Running ansible-lint..."
        ansible-lint -v roles/netbootxyz/tasks

  build:
    name: Build EFI Bootloader
    runs-on: ubuntu:24.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build EFI
      run: |
        echo "Building EFI"
        NEW_NAME=$(./script/build_release | grep "NEW_NAME=" | cut -d'=' -f2)
        echo "NEW_NAME=$NEW_NAME" >> $GITHUB_ENV

    - name: Upload EFI
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.NEW_NAME }}
        path: buildout/ipxe/*.efi
        retention-days: 90
