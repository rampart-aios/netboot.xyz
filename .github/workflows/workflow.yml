name: Workflows

on:
  pull_request:
    branches: [local_dev, development]
  push:
    branches: [local_dev, development]

env:
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  ARTIFACT_RETENTION_DAYS: 90
  DOCKER_PLATFORM: "linux/amd64"

jobs:
  test:
    name: Test and Validate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13' # renovate: datasource=github-tags depName=python
    - name: Test Ansible
      run: source ./script/workflow.sh && test_ansible

  build-pr:
    name: Build EFI for Pull Request
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
    - name: Run PR workflow
      id: pr_workflow
      run: source ./script/workflow.sh && run_pr_workflow
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
        name: netboot.xyz-rampart-aios-${{ steps.pr_workflow.outputs.version }}.efi
        path: buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.pr_workflow.outputs.version }}.efi

  minor-release:
    name: Create Minor Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/local_dev'
    steps:
    - uses: actions/checkout@v4
    - name: Run minor release workflow
      id: release_workflow
      env:
        GH_TOKEN: ${{ github.token }}
      run: source ./script/workflow.sh && run_release_workflow minor
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: netboot.xyz-rampart-aios-${{ steps.release_workflow.outputs.version }}.efi
        path: buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.release_workflow.outputs.version }}.efi
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  major-release:
    name: Create Major Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    steps:
    - uses: actions/checkout@v4
    - name: Run major release workflow
      id: release_workflow
      env:
        GH_TOKEN: ${{ github.token }}
      run: source ./script/workflow.sh && run_release_workflow major
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: netboot.xyz-rampart-aios-${{ steps.release_workflow.outputs.version }}.efi
        path: buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.release_workflow.outputs.version }}.efi
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }} 