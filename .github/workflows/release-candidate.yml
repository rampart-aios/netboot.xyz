name: release-dev

on:
  push:
    branches:
      - local_dev
      - feat-efi-localdev-pipeline
  workflow_dispatch:

jobs:
  dev-build:
    name: Build Development Release
    runs-on: ubuntu-latest
    concurrency:
      group: dev-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4
      with:
        ref: feat-efi-localdev-pipeline # for testing

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build dev release
      run: |
        ./script/build_release

    - name: Set Development Release Tag
      run: |
        ls -la
        VERSION=$(cat ${{ github.workspace }}/version-efi.txt | tr -d '\n')
        echo "release_tag=${VERSION}-dev" >> $GITHUB_ENV

    - name: Tag dev Release
      run: |
        ./script/tag ${{ env.release_tag }}

    - name: Create dev Release and Upload Assets
      uses: svenstaro/upload-release-action@v2
      with:
        file: buildout/ipxe/*
        file_glob: true
        overwrite: true
        prerelease: true
        release_name: ${{ env.release_tag }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ env.release_tag }}
        body: |
          Development release built from the local_dev branch.