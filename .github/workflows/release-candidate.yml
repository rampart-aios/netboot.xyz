name: release-dev

on:
  push:
    branches:
      - local_dev
      - feat-efi-localdev-pipeline
  workflow_dispatch:

jobs:
  dev-build:
    name: Build Development Release
    runs-on: ubuntu-latest
    concurrency:
      group: dev-${{ github.head_ref || github.ref_name }}
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set Base Version
      run: |
        echo "base_version=v0.0.1" >> $GITHUB_ENV

    - name: Tag dev Release
      run: |
        RELEASE_TAG=${{ env.base_version }} ./script/tag
        # The script already sets VERSION_TAG in GITHUB_ENV

    - name: Build dev release
      run: |
        VERSION_TAG=${{ env.VERSION_TAG }} ./script/build_release

    - name: Push Tag to Origin
      run: |
        git push origin ${{ env.VERSION_TAG }}

    - name: Create dev Release and Upload Assets
      uses: svenstaro/upload-release-action@v2
      with:
        file: githubout/*
        file_glob: true
        overwrite: true
        draft: true
        release_name: ${{ env.VERSION_TAG }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ env.VERSION_TAG }}
        body: |
          Development release built from the local_dev branch.
          
          **Version**: ${{ env.VERSION_TAG }}
          **Branch**: ${{ github.ref_name }}
          **Commit**: ${{ github.sha }}