name: Minor Release Workflow

on:
  push:
    branches: [local_dev]
    paths:
      - 'roles/**'
      - 'site.yml'
      - 'user_overrides.yml'
      - 'script/workflow.sh'
      - '.github/workflows/minor-release.yml'
      - '.github/workflows/major-release.yml'
      - '.github/workflows/pr.yml'

env:
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  ARTIFACT_RETENTION_DAYS: 90

jobs:
  minor-release:
    name: Create Minor Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run minor release workflow
      id: release_workflow
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        source ./script/workflow.sh
        output=$(run_release_workflow minor)
        echo "$output"
        echo "version=$(echo "$output" | grep "version=" | tail -1 | cut -d'=' -f2)" >> $GITHUB_OUTPUT
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: netboot.xyz-rampart-aios-${{ steps.release_workflow.outputs.version }}.efi
        path: buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.release_workflow.outputs.version }}.efi
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }} 