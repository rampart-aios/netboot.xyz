name: Pull Request Workflow

on:
  pull_request:
    branches: [local_dev, development]
    paths:
      - 'roles/**'
      - 'site.yml'
      - 'user_overrides.yml'
      - 'script/workflow.sh'
      - '.github/workflows/minor-release.yml'
      - '.github/workflows/major-release.yml'
      - '.github/workflows/pr.yml'

env:
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  ARTIFACT_RETENTION_DAYS: 90

jobs:
  test:
    name: Test and Validate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13' # renovate: datasource=github-tags depName=python
    - name: Test Ansible
      run: source ./script/workflow.sh && test_ansible

  build-pr:
    name: Build EFI for Pull Request
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Run PR workflow
      id: pr_workflow
      run: |
        source ./script/workflow.sh
        output=$(run_pr_workflow)
        echo "$output"
        echo "version=$(echo "$output" | grep "version=" | tail -1 | cut -d'=' -f2)" >> $GITHUB_OUTPUT
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
        name: netboot.xyz-rampart-aios-${{ steps.pr_workflow.outputs.version }}.efi
        path: buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.pr_workflow.outputs.version }}.efi 