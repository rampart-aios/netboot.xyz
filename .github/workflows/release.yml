name: release_local_main

on:
  push:
    branches: [local_main, feat-efi-pipeline]

env:
  SOURCE_BRANCH: "feat-efi-pipeline"
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  DOCKER_IMAGE: "localbuild"
  RELEASE_NOTES: "Release of Rampart-AIOS iPXE EFI bootloader"
  RELEASE_DRAFT: "false"
  RELEASE_PRERELEASE: "false"
  VERSION_PREFIX: "v[1-9]"
  
  ARTIFACT_RETENTION_DAYS: 90
  GH_TOKEN: ${{ github.token }}

jobs:
  get-version:
    name: "Get Version"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Get local_main version
      id: get_version
      run: |
        # Get the latest local_main version from existing releases
        latest_version=$(gh release list --limit 1000 | grep "${{ env.VERSION_PREFIX }}" | head -1 | awk '{print $1}' | sed 's/v//')
        
        if [ -z "$latest_version" ]; then
          # No existing local_main versions, start with v1.0.0
          new_version="1.0.0"
        else
          # Extract major number and increment
          major=$(echo $latest_version | awk -F'.' '{print $1}')
          new_major=$((major + 1))
          new_version="$new_major.0.0"
        fi
        
        echo "version=v$new_version"
        echo "version=v$new_version" >> $GITHUB_OUTPUT

  download-efi:
    name: "Download EFI Artifact"
    needs: get-version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    
    - name: Download EFI artifact from feat-efi-pipeline branch
      run: |
        set -e
        echo "Finding latest successful run for workflow 'test_and_build' on branch '${{ env.SOURCE_BRANCH }}'..."
        run_id=$(gh run list --workflow test_and_build --branch "${{ env.SOURCE_BRANCH }}" --status success --json databaseId -q '.[0].databaseId')
        if [ -z "$run_id" ]; then
          echo "No successful runs found for branch '${{ env.SOURCE_BRANCH }}'."; exit 1
        fi
        echo "Downloading artifacts from run ID: $run_id"
        gh run download "$run_id" -p "${{ env.EFI_FILENAME_PREFIX }}-${{ env.SOURCE_BRANCH }}-*.efi" -D buildout/ipxe/
    
    - name: List downloaded artifacts
      run: |
        echo "Downloaded artifacts:"
        ls -la buildout/ipxe/
    
    - name: Rename EFI to local_main format
      run: |
        # Find the downloaded EFI file and rename it to local_main format
        efi_file=$(find buildout/ipxe/ -name "${{ env.EFI_FILENAME_PREFIX }}-${{ env.SOURCE_BRANCH }}-*.efi" | head -1)
        if [ -n "$efi_file" ]; then
          local_main_filename="${{ env.EFI_FILENAME_PREFIX }}-local_main-${{ needs.get-version.outputs.version }}.efi"
          cp "$efi_file" "buildout/ipxe/$local_main_filename"
          echo "Renamed to $local_main_filename"
        else
          echo "Error: No EFI artifact found for branch ${{ env.SOURCE_BRANCH }}"
          exit 1
        fi

  create-release:
    name: "Create Production Release"
    needs: [get-version, download-efi]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    
    - name: Create production release
      run: |
        gh release create ${{ needs.get-version.outputs.version }} \
          --title "${{ needs.get-version.outputs.version }}" \
          --notes "${{ env.RELEASE_NOTES }}" \
          --draft=${{ env.RELEASE_DRAFT }} \
          --prerelease=${{ env.RELEASE_PRERELEASE }}
    
    - name: Upload EFI to release
      run: |
        gh release upload ${{ needs.get-version.outputs.version }} \
          buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-local_main-${{ needs.get-version.outputs.version }}.efi \
          --clobber

  upload-artifact:
    name: "Upload Versioned Artifact"
    needs: [get-version, download-efi]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.EFI_FILENAME_PREFIX }}-local_main-${{ needs.get-version.outputs.version }}.efi
        path: buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-local_main-${{ needs.get-version.outputs.version }}.efi
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }} 