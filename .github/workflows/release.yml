name: release_local_main

on:
  push:
    branches: [feat-efi-pipeline]

env:
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  ARTIFACT_RETENTION_DAYS: 90
  DOCKER_IMAGE: "localbuild"
  RELEASE_NOTES: "Release of Rampart-AIOS iPXE EFI bootloader"
  RELEASE_DRAFT: "false"
  RELEASE_PRERELEASE: "false"
  VERSION_PREFIX: "v[1-9]"

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Get local_main version
      id: get_version
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Get the latest local_main version from existing releases
        latest_version=$(gh release list --limit 1000 | grep "${{ env.VERSION_PREFIX }}" | head -1 | awk '{print $1}' | sed 's/v//')
        
        if [ -z "$latest_version" ]; then
          # No existing local_main versions, start with v1.0.0
          new_version="1.0.0"
        else
          # Extract major number and increment
          major=$(echo $latest_version | awk -F'.' '{print $1}')
          new_major=$((major + 1))
          new_version="$new_major.0.0"
        fi
        
        echo "version=v$new_version"
        echo "version=v$new_version" >> $GITHUB_OUTPUT

  download-efi:
    name: Download EFI Artifact
    needs: get-version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Get current branch
      id: get_branch
      run: |
        branch_name=$(git rev-parse --abbrev-ref HEAD | sed 's/[^a-zA-Z0-9]/-/g')
        echo "branch_name=$branch_name" >> $GITHUB_OUTPUT
        echo "Current branch: $branch_name"
    
    - name: Download EFI artifact from latest workflow run
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.EFI_FILENAME_PREFIX }}-${{ steps.get_branch.outputs.branch_name }}-*
        path: buildout/ipxe/
    
    - name: List downloaded artifacts
      run: |
        echo "Downloaded artifacts:"
        ls -la buildout/ipxe/
    
    - name: Rename EFI to version-specific name
      run: |
        # Find the downloaded EFI file and rename it
        efi_file=$(find buildout/ipxe/ -name "${{ env.EFI_FILENAME_PREFIX }}-${{ steps.get_branch.outputs.branch_name }}-*.efi" | head -1)
        if [ -n "$efi_file" ]; then
          cp "$efi_file" "buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-${{ needs.get-version.outputs.version }}.efi"
          echo "Renamed to ${{ env.EFI_FILENAME_PREFIX }}-${{ needs.get-version.outputs.version }}.efi"
        else
          echo "Error: No EFI artifact found for branch ${{ steps.get_branch.outputs.branch_name }}"
          exit 1
        fi

  create-release:
    needs: [get-version, download-efi]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Create production release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create ${{ needs.get-version.outputs.version }} \
          --title "${{ needs.get-version.outputs.version }}" \
          --notes "${{ env.RELEASE_NOTES }}" \
          --draft=${{ env.RELEASE_DRAFT }} \
          --prerelease=${{ env.RELEASE_PRERELEASE }}
    
    - name: Upload EFI to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload ${{ needs.get-version.outputs.version }} \
          buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-${{ needs.get-version.outputs.version }}.efi \
          --clobber

  upload-artifact:
    needs: [get-version, download-efi]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.EFI_FILENAME_PREFIX }}-${{ needs.get-version.outputs.version }}.efi
        path: buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-${{ needs.get-version.outputs.version }}.efi
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }} 