name: release

on:
  # push:
  pull_request:
    branches:
      - local_dev
    # branches:
    #   - development

jobs:
  major-release:
    name: Create Major Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build EFI bootloader
      run: |
        docker build -t localbuild --platform=linux/amd64 -f Dockerfile .
        docker run --rm -i --platform=linux/amd64 -v $(pwd):/buildout localbuild

    - name: Get commit hash
      id: commit_hash
      run: |
        echo "short_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Verify EFI content
      run: |
        echo "Generated EFI files:"
        ls -la buildout/ipxe/netboot.xyz.efi
        
        echo "Verifying custom chain command in EFI file:"
        strings ./buildout/ipxe/netboot.xyz.efi | grep -i "rampart-aios" || echo "Custom content not found (this is normal for standard builds)"

    - name: Set version
      id: version
      run: |
        # Get the latest major version from existing releases
        LATEST_MAJOR=$(gh release list --limit 1000 | grep "v[1-9]" | head -1 | awk '{print $1}' | sed 's/v//')
        
        if [ -z "$LATEST_MAJOR" ]; then
          # No existing major versions, start with v1.0.0
          NEW_VERSION="1.0.0"
        else
          # Extract major number and increment
          MAJOR=$(echo $LATEST_MAJOR | awk -F'.' '{print $1}')
          NEW_MAJOR=$((MAJOR + 1))
          NEW_VERSION="$NEW_MAJOR.0.0"
        fi
        
        echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Generated major version: v$NEW_VERSION"

    - name: Rename EFI file
      run: |
        cp buildout/ipxe/netboot.xyz.efi buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.version.outputs.version }}.efi
        echo "Renamed netboot.xyz.efi to netboot.xyz-rampart-aios-${{ steps.version.outputs.version }}.efi"

    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: netboot.xyz-rampart-aios-${{ steps.version.outputs.version }}.efi
        path: buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.version.outputs.version }}.efi
        retention-days: 90

    - name: Create Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create ${{ steps.version.outputs.version }} \
          --title "${{ steps.version.outputs.version }}" \
          --notes "Release of Rampart-AIOS iPXE EFI bootloader" \
          --draft=false \
          --prerelease=false

    - name: Upload EFI to Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload ${{ steps.version.outputs.version }} \
          buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.version.outputs.version }}.efi \
          --clobber