name: release_local_dev

on:
  push:
    branches: [local_dev]

env:
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  DOCKER_IMAGE: "localbuild"
  RELEASE_NOTES: "Draft Release of Rampart-AIOS iPXE EFI bootloader"
  RELEASE_DRAFT: "true"
  RELEASE_PRERELEASE: "true"
  VERSION_PREFIX: "v0"
  VERSION_TYPE: "local_dev"
  
  ARTIFACT_RETENTION_DAYS: 90
  GH_TOKEN: ${{ github.token }}

jobs:
  get-version:
    name: "Get Version"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Get version
      id: get_version
      run: |
        # Get the latest version from existing releases
        latest_version=$(gh release list --limit 1000 | grep "${{ env.VERSION_PREFIX }}\." | head -1 | awk '{print $1}' | sed 's/v//')
        
        if [ -z "$latest_version" ]; then
          # No existing versions, start with v0.0.1
          new_version="0.0.1"
        else
          # Extract patch number and increment
          patch=$(echo $latest_version | awk -F'.' '{print $3}')
          new_patch=$((patch + 1))
          new_version="0.0.$new_patch"
        fi
        
        echo "version=v$new_version"
        echo "version=v$new_version" >> $GITHUB_OUTPUT

  build-and-release:
    name: "Build EFI and Create Release"
    needs: get-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build EFI Bootloader
      id: build
      run: |
        echo "Building EFI bootloader for ${{ env.VERSION_TYPE }} version: ${{ needs.get-version.outputs.version }}"
        
        # Build EFI bootloader
        docker build -t ${{ env.DOCKER_IMAGE }} -f Dockerfile .
        docker run --rm -i -v $(pwd):/buildout ${{ env.DOCKER_IMAGE }}
        
        # Verify EFI content
        echo "Verifying EFI content..."
        ls -la buildout/ipxe/netboot.xyz.efi
        
        # Rename EFI file with ${{ env.VERSION_TYPE }} version
        efi_filename="${{ env.EFI_FILENAME_PREFIX }}-${{ env.VERSION_TYPE }}-${{ needs.get-version.outputs.version }}.efi"
        cp buildout/ipxe/netboot.xyz.efi buildout/ipxe/$efi_filename
        echo "Renamed to $efi_filename"
        
        # Verify the renamed EFI file exists
        if [ ! -f "buildout/ipxe/$efi_filename" ]; then
          echo "Error: EFI file not found after renaming!"
          exit 1
        fi
        echo "EFI file verified successfully"
        
        echo "efi_filename=$efi_filename" >> $GITHUB_OUTPUT
    
    - name: Create draft release
      run: |
        gh release create ${{ needs.get-version.outputs.version }} \
          --title "${{ needs.get-version.outputs.version }}" \
          --notes "${{ env.RELEASE_NOTES }}" \
          --draft=${{ env.RELEASE_DRAFT }} \
          --prerelease=${{ env.RELEASE_PRERELEASE }}
    
    - name: Upload EFI to release
      run: |
        gh release upload ${{ needs.get-version.outputs.version }} \
          buildout/ipxe/${{ steps.build.outputs.efi_filename }} \
          --clobber
    
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build.outputs.efi_filename }}
        path: buildout/ipxe/${{ steps.build.outputs.efi_filename }}
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }} 