name: release_local_dev

on:
  push:
    branches: [local_dev, feat-efi-pipeline]

env:
  EFI_FILENAME_PREFIX: "netboot.xyz-rampart-aios"
  DOCKER_IMAGE: "localbuild"
  RELEASE_NOTES: "Draft Release of Rampart-AIOS iPXE EFI bootloader"
  RELEASE_DRAFT: "true"
  RELEASE_PRERELEASE: "true"
  VERSION_PREFIX: "v0"
  
  ARTIFACT_RETENTION_DAYS: 90
  GH_TOKEN: ${{ github.token }}

jobs:
  get-version:
    name: "Get Version"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Get local_dev version
      id: get_version
      run: |
        # Get the latest local_dev version from existing releases
        latest_version=$(gh release list --limit 1000 | grep "${{ env.VERSION_PREFIX }}\." | head -1 | awk '{print $1}' | sed 's/v//')
        
        if [ -z "$latest_version" ]; then
          # No existing local_dev versions, start with v0.0.1
          new_version="0.0.1"
        else
          # Extract patch number and increment
          patch=$(echo $latest_version | awk -F'.' '{print $3}')
          new_patch=$((patch + 1))
          new_version="0.0.$new_patch"
        fi
        
        echo "version=v$new_version"
        echo "version=v$new_version" >> $GITHUB_OUTPUT

  build-efi:
    name: "Build EFI Bootloader"
    needs: get-version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build EFI bootloader
      run: |
        # Build Docker image
        docker build -t ${{ env.DOCKER_IMAGE }} .
        
        # Create output directory
        mkdir -p buildout/ipxe
        
        # Run Docker container to build EFI
        docker run --rm -v "$(pwd)/buildout:/buildout" ${{ env.DOCKER_IMAGE }} \
          make -C /usr/src/ipxe/src bin-x86_64-efi/ipxe.efi EMBED=/usr/src/ipxe/src/config/local/ipxe.conf
        
        # Rename the built EFI file
        mv buildout/ipxe/ipxe.efi "buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-local_dev-${{ needs.get-version.outputs.version }}.efi"
        
        echo "Built EFI bootloader: ${{ env.EFI_FILENAME_PREFIX }}-local_dev-${{ needs.get-version.outputs.version }}.efi"
    
    - name: Verify EFI file
      run: |
        if [ ! -f "buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-local_dev-${{ needs.get-version.outputs.version }}.efi" ]; then
          echo "Error: EFI file not found!"
          exit 1
        fi
        echo "EFI file verified successfully"

  create-release:
    name: "Create Draft Release"
    needs: [get-version, build-efi]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    
    - name: Create draft release
      run: |
        gh release create ${{ needs.get-version.outputs.version }} \
          --title "${{ needs.get-version.outputs.version }}" \
          --notes "${{ env.RELEASE_NOTES }}" \
          --draft=${{ env.RELEASE_DRAFT }} \
          --prerelease=${{ env.RELEASE_PRERELEASE }}
    
    - name: Upload EFI to release
      run: |
        gh release upload ${{ needs.get-version.outputs.version }} \
          buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-local_dev-${{ needs.get-version.outputs.version }}.efi \
          --clobber

  upload-artifact:
    name: "Upload Versioned Artifact"
    needs: [get-version, build-efi]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    
    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.EFI_FILENAME_PREFIX }}-local_dev-${{ needs.get-version.outputs.version }}.efi
        path: buildout/ipxe/${{ env.EFI_FILENAME_PREFIX }}-local_dev-${{ needs.get-version.outputs.version }}.efi
        retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }} 