name: development

on:
  # push:
  pull_request:
    branches:
      - local_dev
    # branches:
    #   - development

jobs:
  minor-release:
    name: Create Minor Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run minor release workflow
      id: release_workflow
      env:
        GH_TOKEN: ${{ github.token }}
      run: source ./script/workflow.sh && run_release_workflow minor

    - name: Upload EFI file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: netboot.xyz-rampart-aios-${{ steps.release_workflow.outputs.version }}.efi
        path: buildout/ipxe/netboot.xyz-rampart-aios-${{ steps.release_workflow.outputs.version }}.efi
        retention-days: 90